# KLDM Configuration

# Model
hidden_dim: 128
num_layers: 4
num_radial: 16
num_spherical: 7

# Diffusion
eps: 1.0e-6
t_min: 1.0e-3
t_max: 1.0

# Training
learning_rate: 1.0e-3
batch_size: 32
num_epochs: 100
warmup_epochs: 10
weight_decay: 1.0e-4

# Loss weights
loss_weight_v: 1.0
loss_weight_l: 1.0
loss_weight_a: 1.0

# Data
data_path: data/mp_20
task: dng
species_mode: atomic_numbers

# Device
device: cuda

# Checkpoint
checkpoint_dir: models/kldm_checkpoints
save_every: 10
