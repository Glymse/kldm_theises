experiment_name: plus_mp20_lattice_eps_pc
sampler_config: ../../samplers/predictor_corrector.yaml

dataset:
  task: csp
  name: mp20
  root: null
  batch_size: 256
  num_workers: 1
  pin_memory: true

time_sampler:
  type: loss_second_moment
  n_bins: 64
  history_per_bin: 10
  alpha: 0.5
  min_prob: 0.002
  max_prob: 0.10
  velocity_weight: 0.7
  lattice_weight: 0.3
  use_importance_weights: false
  clip_importance_weights: true
  weight_clip_min: 0.5
  weight_clip_max: 2.0

model:
  eps: 1.0e-6
  lattice_parameterization: eps
  wrapped_normal_K: 3
  tdm_n_sigmas: 2000
  tdm_compute_sigma_norm: true
  tdm_velocity_scale: 0.15915494309189535
  tdm_sigma_norm_estimator: quadrature
  tdm_sigma_norm_density_K: 40
  tdm_sigma_norm_grid_points: 4097
  tdm_sigma_norm_mc_samples: 20000
  tdm_centered_sigma_norm_correction: false
  score_network:
    hidden_dim: 512
    time_dim: 256
    num_layers: 6
    num_freqs: 128
    ln: true
    h_dim: 100
    smooth: false
    pred_v: true
    pred_l: true
    pred_h: false
    zero_cog: true

optimizer:
  lr: 1.0e-3
  weight_decay: 1.0e-12
  amsgrad: true
  foreach: true

ema:
  enabled: true
  decay: 0.999
  start_epoch: 500

logging:
  train_every_epochs: 1
  wandb_checkpoints: true

validation:
  every_n_epochs: 100
  ema_val: false
  subset_size: 1024
  subset_seed: 123
  sampling_max_graphs: 1024

checkpoint:
  resume_from: null
  wandb_resume_id: null # Set to an old W&B run id, e.g. w41cll5b, to continue logging on the same run graph.

sampling_eval:
  split: test
  batch_size: 128
  num_targets: 1024
  subset_seed: 123
  samples_per_target: 20
